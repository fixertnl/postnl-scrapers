name: PostNL Sync

# Getriggerd door Supabase pg_cron via de GitHub API (workflow_dispatch).
# NOOIT on: schedule gebruiken — dat vuurt minuten tot uren te laat.
on:
  workflow_dispatch:
    inputs:
      datum:
        description: 'Specifieke datum (YYYY-MM-DD), leeg = vandaag'
        required: false
        type: string
      alle_datums:
        description: 'Alle datums uit het portaal synchroniseren'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.50.0-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # node_modules cachen zodat npm install niet elke run opnieuw downloadt.
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: worker/postnl-sync/node_modules
          key: sync-node-${{ hashFiles('worker/postnl-sync/package.json') }}

      - name: Installeer dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        working-directory: worker/postnl-sync
        run: npm install --omit=dev

      - name: PostNL sync
        working-directory: worker/postnl-sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          KLANT_ID: ${{ secrets.KLANT_ID }}
          POSTNL_HEADLESS: 'true'
          SYNC_DATUM: ${{ inputs.datum }}
          RUN_ALL: ${{ inputs.alle_datums }}
        run: node src/index.js --once
